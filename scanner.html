<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Serveur - FIDDLE</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0d12;
            --card-bg: rgba(30, 34, 43, 0.7);
            --primary: #ff7675; 
            --success: #10b981;
            --error: #ef4444;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-color); 
            color: white; 
            text-align: center; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.4s ease; /* Pour le passage au vert/rouge */
        }

        /* --- VUE SCANNER --- */
        #scanner-view {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
        }

        .header-title { margin-bottom: 30px; }
        .header-title h1 { font-size: 24px; font-weight: 800; margin: 0; }
        .header-title p { color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        #reader { 
            background: var(--card-bg);
            border-radius: 32px; 
            overflow: hidden; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1) !important;
        }

        /* Style des boutons natifs du scanner */
        #reader button { 
            background: var(--primary); color: white; border: none; 
            padding: 12px 20px; border-radius: 12px; font-weight: 700; 
            margin: 10px; cursor: pointer;
        }
        #reader a { color: var(--primary); text-decoration: none; font-weight: 600; margin-top: 10px; display: inline-block; }

        /* --- VUE RÉSULTAT (Validation) --- */
        #result-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 999;
        }

        .res-icon { font-size: 100px; margin-bottom: 20px; }
        .res-text { font-size: 28px; font-weight: 800; line-height: 1.2; }
        
        .loader {
            border: 6px solid rgba(255,255,255,0.1);
            border-top: 6px solid white;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #btn-retry {
            margin-top: 30px; padding: 15px 40px; border: none;
            border-radius: 16px; background: white; color: black;
            font-weight: 800; cursor: pointer; display: none;
        }
    </style>
</head>

<body onload="App.initScanner()">

    <div id="scanner-view">
        <div class="header-title">
            <p>Interface Serveur</p>
            <h1 class="nom-resto">Chargement...</h1>
        </div>
        <div id="reader"></div>
        <p style="margin-top:20px; color: #64748b; font-size: 14px;">Placez le QR Code dans le cadre</p>
    </div>

    <div id="loader-view" style="display:none; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
        <div class="loader"></div>
        <h2>Validation en cours...</h2>
    </div>

    <div id="result-view">
        <div class="res-icon" id="res-icon"></div>
        <div class="res-text" id="res-text"></div>
        <button id="btn-retry" onclick="window.location.reload()">RÉESSAYER</button>
    </div>

    <audio id="snd-ok" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <audio id="snd-err" src="https://assets.mixkit.co/active_storage/sfx/2954/2954-preview.mp3"></audio>

</body>
</html>
