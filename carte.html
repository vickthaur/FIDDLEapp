<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Carte Fidélité</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script src="app.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Variables dynamiques gérées par app.js */
        :root { 
            --primary: #ffffff; 
            --primary-glow: rgba(255, 255, 255, 0.2); 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0b0d12; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            background-image: radial-gradient(circle at top right, #1a1f2e 0%, #0b0d12 60%);
        }

        .card-container { 
            background: rgba(30, 34, 43, 0.7); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            width: 100%; 
            max-width: 380px; 
            border-radius: 30px; 
            padding: 40px 25px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .nom-resto { 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: var(--primary); 
            margin-bottom: 25px; 
            font-weight: 800; 
        }

        .points-number { 
            font-size: 72px; 
            font-weight: 800; 
            line-height: 1; 
            margin: 10px 0; 
            text-shadow: 0 0 20px var(--primary-glow); 
        }

        .progress-container { 
            background: rgba(255,255,255,0.05); 
            height: 12px; 
            border-radius: 20px; 
            margin: 20px 0; 
            overflow: hidden; 
        }

        .progress-bar { 
            background: linear-gradient(90deg, var(--primary), #fff); 
            height: 100%; 
            width: 0%; 
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1); 
        }
        
        #qrcode { 
            background: white; 
            padding: 12px; 
            border-radius: 20px; 
            display: inline-block; 
            margin: 25px 0; 
            border: 4px solid rgba(255,255,255,0.1);
        }

        /* Effet de pulsation pendant le chargement */
        .loading { animation: pulse 1.5s infinite; opacity: 0.5; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.7; } 100% { opacity: 0.3; } }
    </style>
</head>

<body onload="App.initCarte()">

    <div class="card-container">
        <div class="nom-resto">Chargement...</div>
        
        <p style="color: #94a3b8; font-size: 16px;">
            Bonjour, <span id="user-prenom" class="loading">...</span>
        </p>
        
        <div class="points-number loading" id="user-points">--</div>
        <div style="font-size: 11px; color: #64748b; letter-spacing: 2px; font-weight: 600;">
            POINTS FIDÉLITÉ
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="barre"></div>
        </div>
        
        <p id="phrase-info" style="font-size: 14px; color: #cbd5e1; font-weight: 500; min-height: 20px;">
            Calcul de vos points...
        </p>

        <div id="qrcode"></div>
        
        <p style="font-size: 12px; color: #94a3b8;">
            Présentez ce QR Code au serveur
        </p>
    </div>

</body>
</html>
